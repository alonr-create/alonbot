<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="referrer" content="no-referrer">
<title>WA Light — נכנס/יוצא</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:-apple-system,'Segoe UI',Rubik,Arial,sans-serif;background:#0b141a;color:#e9edef;font-size:15px;-webkit-font-smoothing:antialiased}
  a{color:#53bdeb;text-decoration:none}
  #app{display:grid;grid-template-columns:340px 1fr;grid-template-rows:100%;height:100vh;height:100dvh;overflow:hidden}
  #side,#main{min-height:0;min-width:0;overflow:hidden}
  header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#202c33;border-bottom:1px solid #2a3942;font-weight:600}
  header .badge{margin-inline-start:auto;font-size:12px;color:#8696a0;font-weight:400}
  #side{display:flex;flex-direction:column;background:#111b21;border-inline-end:1px solid #2a3942;min-width:0}
  #search{padding:8px 12px;background:#111b21;border-bottom:1px solid #2a3942}
  #search input{width:100%;padding:8px 12px;border:1px solid #2a3942;background:#202c33;color:#e9edef;border-radius:20px;font-size:14px;outline:none}
  #list{flex:1;overflow-y:auto}
  .row{display:flex;flex-direction:column;gap:2px;padding:10px 14px;border-bottom:1px solid #1f2c33;cursor:pointer;transition:background .12s}
  .row:hover{background:#202c33}
  .row.active{background:#2a3942}
  .row .top{display:flex;align-items:baseline;gap:8px}
  .row .name{font-weight:600;font-size:15px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .time{font-size:11px;color:#8696a0;flex-shrink:0;direction:ltr;unicode-bidi:isolate}
  .row .preview{display:flex;align-items:center;gap:6px;font-size:13px;color:#8696a0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .preview .arrow{font-size:11px;flex-shrink:0}
  .row .preview .arrow.in{color:#00a884}
  .row .preview .arrow.out{color:#53bdeb}
  .row .preview .text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;unicode-bidi:plaintext}
  .row.unread .name{color:#fff}
  .row.unread .preview{color:#d1d7db;font-weight:500}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#00a884;flex-shrink:0}
  #main{display:flex;flex-direction:column;min-width:0;min-height:0;background:#0b141a;background-image:linear-gradient(135deg,#0c1418 25%,#0b141a 25%,#0b141a 50%,#0c1418 50%,#0c1418 75%,#0b141a 75%,#0b141a)}
  #conv-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#202c33;border-bottom:1px solid #2a3942;flex-shrink:0}
  #back{display:none;background:none;border:none;color:#e9edef;font-size:22px;cursor:pointer;padding:0 4px}
  #conv-title{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #conv-sub{font-size:12px;color:#8696a0;flex-shrink:0;unicode-bidi:plaintext}
  #conv-actions{margin-inline-start:auto;display:flex;gap:6px}
  .btn{background:#2a3942;color:#e9edef;border:none;padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
  .btn:hover{background:#374247}
  .btn.primary{background:#005c4b}
  .btn.primary:hover{background:#077265}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  #thread{flex:1;min-height:0;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:6px;direction:ltr}
  #thread > *{direction:rtl}
  .msg{max-width:72%;padding:8px 12px;border-radius:8px;font-size:14.5px;line-height:1.4;word-wrap:break-word;white-space:pre-wrap;box-shadow:0 1px 0.5px rgba(0,0,0,.13);position:relative;unicode-bidi:plaintext}
  .msg.in{margin-right:auto;background:#202c33;border-top-right-radius:0}
  .msg.out{margin-left:auto;background:#005c4b;border-top-left-radius:0}
  .msg .ts{display:block;font-size:10.5px;color:#8696a0;margin-top:4px;text-align:end;direction:ltr;unicode-bidi:isolate}
  .msg.template{opacity:.85;font-style:italic}
  .msg .meta-tag{display:inline-block;font-size:10px;color:#8696a0;background:rgba(0,0,0,.2);padding:1px 6px;border-radius:8px;margin-bottom:4px}
  #empty{flex:1;display:flex;align-items:center;justify-content:center;color:#667781;font-size:14px;text-align:center;padding:20px}
  .day-sep{align-self:center;font-size:11px;color:#8696a0;background:#1f2c33;padding:4px 10px;border-radius:8px;margin:8px 0;direction:rtl}
  #composer{display:none;padding:8px 10px;background:#202c33;border-top:1px solid #2a3942;gap:8px;align-items:flex-end;flex-shrink:0}
  body.has-conv #composer{display:flex}
  body:not(.has-conv) #window-banner{display:none !important}
  #composer textarea{flex:1;min-height:38px;max-height:140px;padding:9px 12px;border:1px solid #2a3942;background:#2a3942;color:#e9edef;border-radius:18px;font-family:inherit;font-size:14.5px;line-height:1.4;resize:none;outline:none}
  #composer textarea:focus{border-color:#005c4b}
  #send-btn{background:#005c4b;color:#fff;border:none;border-radius:50%;width:42px;height:42px;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  #send-btn:hover{background:#077265}
  #send-btn:disabled{opacity:.5;cursor:not-allowed}
  #refreshing{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#005c4b;color:#fff;padding:4px 12px;border-radius:12px;font-size:12px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:5}
  #refreshing.on{opacity:1}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#005c4b;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:6;max-width:80%;text-align:center}
  #toast.on{opacity:1}
  #toast.err{background:#a13838}
  @media (max-width:720px){
    #app{grid-template-columns:1fr}
    #main{display:none}
    body.viewing #side{display:none}
    body.viewing #main{display:flex}
    #back{display:inline-block}
  }
  html.embed #app{grid-template-columns:1fr}
  html.embed #side{display:none}
  html.embed #main{display:flex}
  html.embed #back{display:none}
</style>
</head>
<body>
<div id="app">
  <aside id="side">
    <header>WhatsApp — קו 148 <span class="badge" id="count"></span></header>
    <div id="search"><input id="q" type="search" placeholder="חיפוש לפי שם או טלפון…" autocomplete="off"></div>
    <div id="list"></div>
  </aside>
  <section id="main">
    <div id="conv-header">
      <button id="back" aria-label="חזרה">→</button>
      <div id="conv-title">בחר שיחה</div>
      <div id="conv-sub"></div>
      <div id="conv-actions"></div>
    </div>
    <div id="thread"><div id="empty">בחר שיחה מהרשימה כדי לראות הודעות נכנסות ויוצאות</div></div>
    <div id="window-banner" style="display:none;font-size:11.5px;padding:6px 12px;text-align:center;direction:rtl;border-top:1px solid #2a3942;flex-shrink:0"></div>
    <div id="composer">
      <textarea id="compose-text" rows="1" placeholder="כתוב הודעה…" dir="auto"></textarea>
      <button id="send-btn" aria-label="שלח" title="שלח (Enter)">➤</button>
    </div>
  </section>
</div>
<div id="refreshing">מתעדכן…</div>
<div id="toast"></div>

<script>
(() => {
const url = new URL(location.href);
let TOKEN = url.searchParams.get('token') || '';
const REQUESTED_PHONE = url.searchParams.get('phone') || '';
const EMBED = url.searchParams.get('embed') === '1' || window.self !== window.top;
if (TOKEN) {
  url.searchParams.delete('token');
  history.replaceState(null, '', url.pathname + (url.search || '') + url.hash);
}
if (EMBED) document.documentElement.classList.add('embed');

const qs = (s)=>document.querySelector(s);
const list = qs('#list'), thread = qs('#thread'), countEl = qs('#count');
const convTitle = qs('#conv-title'), convSub = qs('#conv-sub'), convActions = qs('#conv-actions');
const refreshing = qs('#refreshing'), toastEl = qs('#toast');

let leads = [], active = null, searchTerm = '';
let leadsReqId = 0, convReqId = 0;
let leadsInflight = null, convInflight = null;
let userScrolledUp = false;
let templateBodies = {};
let lastIncomingAt = null; // ms timestamp of latest customer-incoming msg in active conv
const WA_24H_MS = 24 * 60 * 60 * 1000;
const FALLBACK_TEMPLATE = 'dprisha_general_v1'; // {{1}} placeholder pattern with דקל לפרישה signature

function flash(){ refreshing.classList.add('on'); setTimeout(()=>refreshing.classList.remove('on'), 600); }
function toast(msg, err){
  toastEl.textContent = msg;
  toastEl.classList.toggle('err', !!err);
  toastEl.classList.add('on');
  setTimeout(()=>toastEl.classList.remove('on'), 2500);
}

async function api(path, opts){
  const init = Object.assign({ credentials: 'same-origin', headers: {} }, opts || {});
  if (TOKEN) init.headers['x-dashboard-token'] = TOKEN;
  const r = await fetch(path, init);
  if (r.status === 401) throw new Error('Unauthorized — token missing/expired');
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function timeShort(iso){
  const d = parseDate(iso); if (!d) return '';
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
  const y = new Date(now); y.setDate(now.getDate()-1);
  if (d.toDateString() === y.toDateString()) return 'אתמול';
  const diff = (now - d) / (1000*60*60*24);
  if (diff < 7) return ['א','ב','ג','ד','ה','ו','ש'][d.getDay()];
  return d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'});
}

function parseDate(iso){
  if (!iso) return null;
  const s = typeof iso === 'string' ? iso : String(iso);
  const norm = s.includes('T') || s.endsWith('Z') ? s : s.replace(' ', 'T');
  const d = new Date(norm);
  return isNaN(d.getTime()) ? null : d;
}

function dayLabel(iso){
  const d = parseDate(iso); if (!d) return '';
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return 'היום';
  const y = new Date(now); y.setDate(now.getDate()-1);
  if (d.toDateString() === y.toDateString()) return 'אתמול';
  return d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'});
}

function cleanContent(c){
  if (!c) return { text: '', template: null, interactive: false, rendered: '' };
  let s = String(c);
  const tmpl = s.match(/^\[template:([^\]\n]+)\]/);
  if (tmpl) s = s.slice(tmpl[0].length);
  const idx = s.indexOf('[interactive:');
  const interact = idx !== -1;
  if (interact) s = s.slice(0, idx);
  s = s.trim();
  let rendered = '';
  if (tmpl) {
    const name = tmpl[1].trim();
    const body = templateBodies[name];
    if (body) {
      const params = s.split(',').map(p => p.trim()).filter(Boolean);
      rendered = body.replace(/\{\{(\d+)\}\}/g, (_, n) => params[Number(n) - 1] ?? `{{${n}}}`);
    }
  }
  return { text: s, template: tmpl ? tmpl[1].trim() : null, interactive: interact, rendered };
}

function dedupeMessages(messages){
  const out = [];
  const recent = { user: [], assistant: [] };
  for (const m of messages) {
    const c = cleanContent(m.content);
    const key = (c.template || '') + '|' + (c.text || '').trim();
    const role = m.role === 'user' ? 'user' : 'assistant';
    const list = recent[role];
    if (list.indexOf(key) !== -1) continue;
    out.push(m);
    list.push(key);
    if (list.length > 5) list.shift();
  }
  return out;
}

function previewText(c){
  if (!c) return '';
  if (c.rendered) return c.rendered.replace(/\n+/g, ' ');
  if (c.text) return c.text;
  if (c.template) return '📋 ' + c.template;
  if (c.interactive) return '🔘 כפתורים';
  return '';
}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function leadDisplayName(l){ return l && l.name ? l.name : ('+' + (l && l.phone ? l.phone : '')); }
function isUnread(l){ return l.last_message_role === 'user'; }
function mondayUrl(l){
  if (!l || !l.monday_item_id) return null;
  // Use the server's /m/:itemId redirect — it queries Monday for the actual board
  // (lead source can be misleading: some voice_agent leads live on Alon.dev's board).
  return '/m/' + encodeURIComponent(l.monday_item_id);
}

function renderList(){
  const term = searchTerm.trim().toLowerCase();
  const filtered = term
    ? leads.filter(l => (l.name||'').toLowerCase().includes(term) || (l.phone||'').includes(term))
    : leads;
  countEl.textContent = filtered.length + ' שיחות';
  const frag = document.createDocumentFragment();
  for (const l of filtered) {
    const inMsg = l.last_message_role === 'user';
    const c = cleanContent(l.last_message);
    const preview = previewText(c).slice(0, 80);
    const row = document.createElement('div');
    row.className = ['row', isUnread(l) ? 'unread' : '', active === l.phone ? 'active' : ''].filter(Boolean).join(' ');
    row.dataset.phone = l.phone;
    row.innerHTML =
      '<div class="top"><span class="name" dir="auto">' + escapeHtml(leadDisplayName(l)) + '</span>' +
      '<span class="time">' + escapeHtml(timeShort(l.last_message_at)) + '</span></div>' +
      '<div class="preview">' +
        (inMsg ? '<span class="dot"></span>' : '') +
        '<span class="arrow ' + (inMsg ? 'in' : 'out') + '">' + (inMsg ? '⬅' : '➡') + '</span>' +
        '<span class="text" dir="auto">' + escapeHtml(preview) + '</span>' +
      '</div>';
    row.addEventListener('click', () => openConv(l.phone));
    frag.appendChild(row);
  }
  list.innerHTML = '';
  if (!filtered.length) {
    list.innerHTML = '<div style="padding:20px;color:#667781;text-align:center;font-size:13px">אין שיחות</div>';
  } else {
    list.appendChild(frag);
  }
}

function nearBottom(el){ return el.scrollHeight - el.scrollTop - el.clientHeight < 80; }

function normalizePhone(raw){
  if (!raw) return '';
  const d = String(raw).replace(/[^\d+]/g, '').replace(/^\+/, '');
  if (d.startsWith('972')) return d;
  if (d.startsWith('0')) return '972' + d.slice(1);
  if (d.length === 9) return '972' + d;
  return d;
}

function renderConvActions(lead){
  convActions.innerHTML = '';
  if (!lead) return;
  const mUrl = mondayUrl(lead);
  if (mUrl) {
    const a = document.createElement('a');
    a.className = 'btn primary'; a.href = mUrl; a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.textContent = '📋 פתח במאנדי';
    convActions.appendChild(a);

    const sync = document.createElement('button');
    sync.className = 'btn'; sync.textContent = '🔄 סנכרן למאנדי';
    sync.title = 'פוסט עדכון במאנדי עם 10 ההודעות האחרונות';
    sync.addEventListener('click', () => syncToMonday(lead.phone, sync));
    convActions.appendChild(sync);
  } else {
    const b = document.createElement('button');
    b.className = 'btn'; b.textContent = '➕ צור ליד במאנדי';
    b.addEventListener('click', () => createMondayFromUI(lead.phone, b));
    convActions.appendChild(b);
  }
}

async function syncToMonday(phone, btn){
  btn.disabled = true; const original = btn.textContent; btn.textContent = 'מסנכרן…';
  try {
    const r = await api('/api/wa-manager/monday-sync-chat/' + encodeURIComponent(phone), { method: 'POST' });
    if (r && r.success) toast('עדכון נוסף למאנדי ✓');
    else throw new Error((r && r.error) || 'סנכרון נכשל');
  } catch (e) {
    toast('שגיאה: ' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = original;
  }
}

async function createMondayFromUI(phone, btn){
  btn.disabled = true; const original = btn.textContent; btn.textContent = 'יוצר…';
  try {
    const r = await api('/api/wa-manager/monday-create-lead/' + encodeURIComponent(phone), { method: 'POST' });
    if (r && r.success && r.monday_item_id) {
      toast('נוצר במאנדי ✓');
      await loadLeads(true);
    } else {
      throw new Error((r && r.error) || 'יצירה נכשלה');
    }
  } catch (e) {
    toast('שגיאה: ' + e.message, true);
    btn.disabled = false; btn.textContent = original;
  }
}

async function openConv(phone){
  active = phone;
  document.body.classList.add('viewing');
  document.body.classList.add('has-conv');
  userScrolledUp = false;
  renderList();
  const lead = leads.find(l => l.phone === phone);
  convTitle.textContent = leadDisplayName(lead || { phone });
  convSub.textContent = lead ? (lead.source || '') : '';
  renderConvActions(lead);
  thread.innerHTML = '<div id="empty">טוען…</div>';
  await refreshConv(phone, true);
}

async function refreshConv(phone, scrollEnd){
  if (convInflight) convInflight.abort();
  const ctrl = new AbortController(); convInflight = ctrl;
  const myId = ++convReqId;
  try {
    const data = await api('/api/wa-manager/conversations/' + encodeURIComponent(phone), { signal: ctrl.signal });
    if (myId !== convReqId || active !== phone) return;
    renderMessages(data.messages || [], scrollEnd);
  } catch (e) {
    if (e.name === 'AbortError') return;
    if (myId === convReqId) thread.innerHTML = '<div id="empty">שגיאה בטעינה: ' + escapeHtml(e.message) + '</div>';
  } finally {
    if (convInflight === ctrl) convInflight = null;
  }
}

function updateWindowBanner(){
  const banner = qs('#window-banner');
  if (!banner) return;
  if (!active) { banner.style.display = 'none'; return; }
  if (!lastIncomingAt) {
    banner.style.display = 'block';
    banner.style.background = 'rgba(161,56,56,.18)';
    banner.style.color = '#f3a8a8';
    banner.textContent = '⚠️ אין הודעה נכנסת — חלון 24h סגור. ההודעה תישלח כ-template ' + FALLBACK_TEMPLATE;
    return;
  }
  const ageMs = Date.now() - lastIncomingAt;
  if (ageMs <= WA_24H_MS) {
    const minutesLeft = Math.floor((WA_24H_MS - ageMs) / 60000);
    const hoursLeft = Math.floor(minutesLeft / 60);
    const minsLeft = minutesLeft % 60;
    const remaining = hoursLeft > 0 ? `${hoursLeft}h ${minsLeft}m` : `${minutesLeft}m`;
    banner.style.display = 'block';
    banner.style.background = 'rgba(0,92,75,.25)';
    banner.style.color = '#a7e0d0';
    banner.textContent = `✅ חלון 24h פתוח — נשארו ${remaining}`;
  } else {
    banner.style.display = 'block';
    banner.style.background = 'rgba(161,56,56,.18)';
    banner.style.color = '#f3a8a8';
    banner.textContent = `⚠️ מחוץ ל-24h — ההודעה תישלח כ-template ${FALLBACK_TEMPLATE}`;
  }
}

function renderMessages(messages, scrollEnd){
  messages = dedupeMessages(messages || []);
  // Track latest incoming (role='user') for 24h window calculation
  lastIncomingAt = null;
  for (const m of messages) {
    if (m.role !== 'assistant') {
      const d = parseDate(m.created_at);
      if (d && (!lastIncomingAt || d.getTime() > lastIncomingAt)) lastIncomingAt = d.getTime();
    }
  }
  updateWindowBanner();
  if (!messages.length){ thread.innerHTML = '<div id="empty">אין הודעות עדיין</div>'; return; }
  const wasNearBottom = scrollEnd || (!userScrolledUp && nearBottom(thread));
  const prevHeight = thread.scrollHeight, prevTop = thread.scrollTop;
  const frag = document.createDocumentFragment();
  let lastDay = '';
  for (const m of messages){
    const d = parseDate(m.created_at);
    const dayKey = d ? d.toDateString() : '';
    if (dayKey && dayKey !== lastDay){
      const sep = document.createElement('div');
      sep.className = 'day-sep'; sep.textContent = dayLabel(m.created_at);
      frag.appendChild(sep); lastDay = dayKey;
    }
    const out = m.role === 'assistant';
    const c = cleanContent(m.content);
    const el = document.createElement('div');
    el.className = ['msg', out ? 'out' : 'in', c.template ? 'template' : ''].filter(Boolean).join(' ');
    el.setAttribute('dir', 'auto');
    let inner = '';
    if (c.template) inner += '<span class="meta-tag">📋 ' + escapeHtml(c.template) + '</span><br>';
    else if (c.interactive) inner += '<span class="meta-tag">🔘 כפתורים</span><br>';
    inner += escapeHtml(c.rendered || c.text);
    const ts = d ? d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}) : '';
    inner += '<span class="ts">' + escapeHtml(ts) + '</span>';
    el.innerHTML = inner;
    frag.appendChild(el);
  }
  thread.innerHTML = '';
  thread.appendChild(frag);
  if (wasNearBottom) thread.scrollTop = thread.scrollHeight;
  else thread.scrollTop = prevTop + (thread.scrollHeight - prevHeight);
}

thread.addEventListener('scroll', () => { userScrolledUp = !nearBottom(thread); });

async function loadLeads(silent){
  if (leadsInflight) return;
  const ctrl = new AbortController(); leadsInflight = ctrl;
  const myId = ++leadsReqId;
  try {
    if (!silent) flash();
    const data = await api('/api/wa-manager/leads', { signal: ctrl.signal });
    if (myId !== leadsReqId) return;
    leads = (data.leads || []).filter(l => l.last_message_at).slice(0, 300);
    renderList();
    if (active && leads.find(l => l.phone === active)) {
      renderConvActions(leads.find(l => l.phone === active));
      await refreshConv(active, false);
    } else if (!active && REQUESTED_PHONE) {
      const target = normalizePhone(REQUESTED_PHONE);
      if (target) await openConv(target);
    }
  } catch (e) {
    if (e.name === 'AbortError') return;
    if (myId === leadsReqId) countEl.textContent = 'שגיאה: ' + e.message;
  } finally {
    if (leadsInflight === ctrl) leadsInflight = null;
  }
}

qs('#q').addEventListener('input', e => { searchTerm = e.target.value; renderList(); });
qs('#back').addEventListener('click', () => { document.body.classList.remove('viewing'); document.body.classList.remove('has-conv'); active = null; renderConvActions(null); renderList(); });

const composeText = qs('#compose-text');
const sendBtn = qs('#send-btn');

function autoSizeTextarea(){
  composeText.style.height = 'auto';
  composeText.style.height = Math.min(140, composeText.scrollHeight) + 'px';
}
composeText.addEventListener('input', autoSizeTextarea);
composeText.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);

function isWindowOpen(){
  if (!lastIncomingAt) return false;
  return (Date.now() - lastIncomingAt) <= WA_24H_MS;
}

async function sendMessage(){
  const text = composeText.value.trim();
  if (!text || !active) return;
  sendBtn.disabled = true;
  composeText.disabled = true;
  try {
    const useTemplate = !isWindowOpen();
    let r;
    if (useTemplate) {
      // Outside 24h window — send as approved template with text as {{1}} param.
      r = await api('/api/wa-manager/send-template', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          phone: active,
          templateName: FALLBACK_TEMPLATE,
          language: 'he',
          bodyParams: [text],
        }),
      });
    } else {
      r = await api('/api/wa-manager/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone: active, message: text }),
      });
    }
    if (!r || r.success === false) throw new Error((r && r.error) || 'שליחה נכשלה');
    composeText.value = '';
    autoSizeTextarea();
    if (useTemplate) toast('נשלח כ-template (' + FALLBACK_TEMPLATE + ')');
    await refreshConv(active, true);
    await loadLeads(true);
  } catch (e) {
    const msg = String(e.message || '');
    if (/24|window|template/i.test(msg)) {
      toast('חלון 24h סגור — נסה template אחר', true);
    } else {
      toast('שגיאה: ' + msg, true);
    }
  } finally {
    sendBtn.disabled = false;
    composeText.disabled = false;
    composeText.focus();
  }
}

// Refresh banner every minute so the countdown stays accurate when idle
setInterval(updateWindowBanner, 60000);

document.addEventListener('visibilitychange', () => { if (!document.hidden) loadLeads(true); });

async function loadTemplateBodies(){
  try {
    const data = await api('/api/wa-manager/template-bodies');
    if (data && data.bodies) templateBodies = data.bodies;
  } catch (e) { /* non-fatal */ }
}

loadTemplateBodies().finally(() => loadLeads());
setInterval(loadTemplateBodies, 10 * 60 * 1000);
setInterval(() => { if (!document.hidden) loadLeads(true); }, 15000);
})();
</script>
</body>
</html>
