services:
  - type: web
    name: alonbot
    runtime: docker
    plan: starter
    region: frankfurt
    healthCheckPath: /health
    disk:
      name: alonbot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: MONDAY_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: ALLOWED_TELEGRAM
        sync: false
      - key: ALLOWED_WHATSAPP
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: WHATSAPP_MODE
        value: cloud
      - key: WA_CLOUD_TOKEN
        sync: false
      - key: WA_CLOUD_PHONE_ID
        sync: false
      - key: FB_ACCESS_TOKEN
        sync: false
      - key: GOOGLE_CALENDAR_SCRIPT_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: WA_CLOUD_TOKEN_2
        sync: false
      - key: WA_CLOUD_PHONE_ID_2
        sync: false
      - key: MODE
        value: cloud
      - key: PORT
        value: 3700
      - key: DATA_DIR
        value: /data
